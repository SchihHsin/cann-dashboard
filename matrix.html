<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>组件评分矩阵</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
:root{
  --green-dark:#37C597;--green-core:#3BE880;--green-bright:#3BF7D1;
  --green-med:#9DFBE8;--green-faded:#C3EDDF;--green-light:#EBFCF7;
  --teal-dark:#179D8A;--teal-core:#1AAFD0;--teal-bright:#02CEFF;
  --teal-med:#80E6FF;--teal-light:#E8F7FB;
  --purple-dark:#4F4DA7;--purple-core:#6A67CE;--purple-bright:#A177FF;
  --purple-med:#D0B8FF;--purple-light:#F0EFFA;
  --gold-dark:#FD9A00;--gold-core:#FFB900;--gold-bright:#FFD200;
  --gold-med:#FFE87F;--gold-light:#FFF8E5;
  --coral-dark:#E63838;--coral-core:#FC636B;--coral-bright:#FF6D92;
  --coral-med:#FFB6C8;--coral-light:#FEEFF0;
  --g1:#F8F8F9;--g2:#EFF0F1;--g3:#E1E2E4;--g4:#CDCFD2;--g5:#B9BCC0;
  --g6:#A1A4AA;--g7:#898E95;--g8:#676D76;--g9:#495058;--g10:#1B2432;
  --bg:var(--g1);--card:#fff;--border:var(--g3);--border-2:var(--g4);
  --text:var(--g10);--text-2:var(--g9);--text-3:var(--g6);
  --primary:var(--purple-core);--primary-2:var(--purple-bright);
  --primary-soft:var(--purple-light);
  --accent:var(--purple-core);
  --good:var(--green-dark);--bad:var(--coral-dark);--warn:var(--gold-dark);
  --blue:var(--teal-core);
  --red-bg:var(--coral-light);--yellow-bg:var(--gold-light);
  --green-bg:var(--green-light);--blue-bg:var(--teal-light);
  --yellow:var(--gold-dark);--green:var(--green-dark);
  --surface:var(--g1);--muted:var(--g7);--dim:var(--g6);
  --radius-xl:22px;--radius-l:18px;--radius-m:12px;--radius-s:8px;
  --shadow-soft:0 1px 2px rgba(39,51,71,.04),0 4px 14px rgba(39,51,71,.04);
  --shadow-pop:0 10px 30px rgba(106,103,206,.18);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{font-family:'JetBrains Mono','PingFang SC','Microsoft YaHei',monospace;color:var(--text);background:var(--bg);-webkit-font-smoothing:antialiased;padding:28px}

.ov-section{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-xl);padding:22px 24px}
.ov-section-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.ov-section-title{font-size:17px;font-weight:800;color:var(--text);letter-spacing:-.01em}
.ov-section-sub{font-size:12px;color:var(--text-3);margin-top:3px;font-weight:500}

.hm-wrap{overflow:hidden}
.hm-grid{display:grid;grid-template-columns:120px repeat(5,1fr);gap:8px;margin-top:4px}
.hm-header{font-size:12px;font-weight:700;color:#3D4452;text-align:center;padding:6px 4px;text-transform:uppercase;letter-spacing:.04em;white-space:nowrap;background:#fff;border:1px solid rgba(223,223,223,0.5);border-radius:12px;height:48px;display:flex;align-items:center;justify-content:center}
.hm-header.first{text-align:left;padding-left:4px;background:none}
.hm-corner{position:relative;overflow:hidden;border-radius:12px;background:#fff;border:1px solid #EFF0F1}
.hm-corner svg{position:absolute;inset:0;width:100%;height:100%}
.hm-corner .hc-col{position:absolute;top:30%;right:18%;font-size:12px;font-weight:600;color:#3D4452;letter-spacing:.04em;text-transform:uppercase}
.hm-corner .hc-row{position:absolute;bottom:30%;left:18%;font-size:12px;font-weight:600;color:#3D4452;letter-spacing:.04em;text-transform:uppercase}
.hm-row-label{display:flex;flex-direction:row;align-items:center;gap:10px;padding:0 8px;font-size:12px;font-weight:700;color:var(--text);background:#fff;border:1px solid rgba(223,223,223,0.5);border-radius:12px;height:48px}
.hm-row-label small{font-size:9.5px;font-weight:500;color:var(--text-3);margin-top:1px;display:block}
.hm-cell{
  border-radius:12px;height:48px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  cursor:pointer;transition:all .15s;border:1px solid #EFF0F1;
  position:relative;
}
.hm-cell:hover{border-width:2px;border-color:var(--bd-hover);background:var(--bg-hover);filter:saturate(1.5)}
.hm-cell.hm-sel{border-color:var(--primary);box-shadow:0 0 0 3px rgba(106,103,206,.15);transform:scale(1.06)}
.hm-cell .cv{font-size:14px;font-weight:800;letter-spacing:-.02em;font-family:'JetBrains Mono','PingFang SC','Microsoft YaHei',monospace}
.hm-cell .ct{font-size:9px;font-weight:600;opacity:.7;margin-top:1px}
.hm-legend{display:flex;align-items:center;gap:10px;margin-top:14px;font-size:11px;color:var(--text-3);font-weight:500;justify-content:flex-end}
.hm-grad{height:8px;width:120px;border-radius:4px;background:linear-gradient(90deg,#FFB9B9 0%,#FFD7B7 35%,#FFF2A5 55%,#C4F3E1 75%,#94E1C8 100%)}

#uxtMatrix .hm-cell{
  border-radius:12px;height:48px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  cursor:pointer;transition:all .15s;border:1px solid #EFF0F1;
  position:relative;
}
#uxtMatrix .hm-cell:hover{border-width:2px;border-color:var(--bd-hover);background:var(--bg-hover);filter:saturate(1.5)}
#uxtMatrix .hm-cell.hm-sel{border-color:var(--primary);box-shadow:0 0 0 3px rgba(106,103,206,.15);transform:scale(1.06)}
#uxtMatrix .hm-cell .cv{font-size:14px;font-weight:800;letter-spacing:-.02em;font-family:'JetBrains Mono','PingFang SC','Microsoft YaHei',monospace}
#uxtMatrix .hm-header{font-size:12px;font-weight:700;color:#3D4452;text-align:center;padding:6px 4px;text-transform:uppercase;letter-spacing:.04em;white-space:nowrap;background:#fff;border:1px solid rgba(223,223,223,0.5);border-radius:12px;height:48px;display:flex;align-items:center;justify-content:center}
#uxtMatrix .hm-row-label{display:flex;flex-direction:row;align-items:center;gap:10px;padding:0 8px;font-size:12px;font-weight:700;color:var(--text);background:#fff;border:1px solid rgba(223,223,223,0.5);border-radius:12px;height:48px}
#uxtMatrix .hm-row-label small{font-size:9.5px;font-weight:500;color:var(--text-3);margin-top:1px;display:block}
</style>
</head>
<body>

<div class="ov-section">
  <div class="ov-section-hdr">
    <div>
      <div class="ov-section-title">组件评分矩阵</div>
      <div class="ov-section-sub">行=组件，列=评分维度；颜色越绿越好，点击格子查看详情</div>
    </div>
  </div>
  <div class="hm-legend">
    差 <div class="hm-grad"></div> 优
  </div>
</div>
<div id="uxtMatrix" style="display:grid;gap:8px;margin-top:14px"></div>
<div id="uxtMatrixDetail" style="display:none;margin-top:14px;padding:14px 18px;background:#fff;border:1px solid #EFF0F1;border-radius:var(--radius-m)"></div>

<script>
function heatColor(score){
  if(score < 20) return 'rgba(224, 33, 40, 0.05)';
  if(score < 40) return 'rgba(244, 132, 12, 0.05)';
  if(score < 60) return 'rgba(5, 131, 88, 0.05)';
  if(score < 80) return 'rgba(18, 113, 128, 0.05)';
  return 'rgba(57, 121, 249, 0.05)';
}
function borderColor(score){
  if(score < 20) return 'rgba(224, 33, 40, 0.1)';
  if(score < 40) return 'rgba(244, 132, 12, 0.1)';
  if(score < 60) return 'rgba(5, 131, 88, 0.1)';
  if(score < 80) return 'rgba(18, 113, 128, 0.1)';
  return 'rgba(57, 121, 249, 0.1)';
}
function borderColorHover(score){
  if(score < 20) return '#E02128';
  if(score < 40) return '#F4840C';
  if(score < 60) return '#058358';
  if(score < 80) return '#127180';
  return '#3979F9';
}
function heatColorHover(score){
  if(score < 20) return 'rgba(224, 33, 40, 0.2)';
  if(score < 40) return 'rgba(244, 132, 12, 0.2)';
  if(score < 60) return 'rgba(5, 131, 88, 0.2)';
  if(score < 80) return 'rgba(18, 113, 128, 0.2)';
  return 'rgba(57, 121, 249, 0.2)';
}
function textColor(score){
  if(score < 20) return '#E02128';
  if(score < 40) return '#F4840C';
  if(score < 60) return '#058358';
  if(score < 80) return '#127180';
  return '#3979F9';
}

function cellTrendSvg(t){
  if(!t) return '';
  if(t==='u') return `<svg width="7" height="5" viewBox="0 0 8 8" fill="none" xmlns="http://www.w3.org/2000/svg" style="flex-shrink:0"><polyline points="1,7 4,3 7,7" stroke="#6DBD9A" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
  if(t==='d') return `<svg width="7" height="5" viewBox="0 0 8 8" fill="none" xmlns="http://www.w3.org/2000/svg" style="flex-shrink:0"><polyline points="1,1 4,5 7,1" stroke="#E89494" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
  return `<svg width="7" height="5" viewBox="0 0 8 8" fill="none" xmlns="http://www.w3.org/2000/svg" style="flex-shrink:0"><line x1="1" y1="4" x2="7" y2="4" stroke="#AAAAAA" stroke-width="1.8" stroke-linecap="round"/></svg>`;
}
window._mxCfg={};
var REPORT_MD;
function laughIcon(){return '<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="9" cy="9" r="1"/><circle cx="15" cy="9" r="1"/><path d="M6 15h12M6 15c3 5 9 5 12 0"/></svg>'}
function smileIcon(){return '<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="9" cy="9" r="1"/><circle cx="15" cy="9" r="1"/><path d="M6 16c3 2 9 2 12 0"/></svg>'}
function neutralIcon(){return '<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="9" cy="9" r="1"/><circle cx="15" cy="9" r="1"/><line x1="6" y1="16" x2="18" y2="16"/></svg>'}
function sadIcon(){return '<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="9" cy="9" r="1"/><circle cx="15" cy="9" r="1"/><path d="M6 17c3-2 9-2 12 0"/></svg>'}
function cryIcon(){return '<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="7" y1="8" x2="11" y2="10"/><line x1="13" y1="10" x2="17" y2="8"/><path d="M6 16c3-3 9-3 12 0"/></svg>'}
function renderMatrix(cfg){
  const grid=document.getElementById(cfg.gridId);
  if(!grid)return;
  const {cols,extraCols=[],rows}=cfg;
  const extraW=extraCols.length?' '+extraCols.map(()=>'auto').join(' '):'';
  grid.style.gridTemplateColumns=`${cfg.rowLabelWidth} ${cols.map(()=>'1fr').join(' ')}${extraW}`;
  window._mxCfg[cfg.gridId]=cfg;
  const corner=cfg.corner||{row:'行',col:'列'};
  let html='';
  const mergedExtras=new Set();
  if(cfg.groupCols){
    html+=`<div class="hm-corner" style="grid-row:span 2"><svg viewBox="0 0 100 100" preserveAspectRatio="none"><line x1="0" y1="0" x2="100" y2="100" stroke="#EFF0F1" stroke-width="1"/></svg><span class="hc-col">${corner.col}</span><span class="hc-row">${corner.row}</span></div>`;
    let extraIdx=0;
    cfg.groupCols.forEach(g=>{
      const span=g.span||1;
      const colSpan=span>1?`grid-column:span ${span};`:'';
      if(g.mergeHeader){
        mergedExtras.add(extraIdx);
        html+=`<div style="${colSpan}grid-row:span 2;font-size:12px;font-weight:700;color:#3D4452;text-align:center;letter-spacing:.04em;text-transform:uppercase;background:#fff;border:1px solid #EFF0F1;border-radius:10px;display:flex;align-items:center;justify-content:center">${g.label||''}</div>`;
        extraIdx++;
      } else if(g.label){
        html+=`<div style="${colSpan}font-size:12px;font-weight:700;color:#3D4452;text-align:center;letter-spacing:.04em;text-transform:uppercase;background:#fff;border:1px solid #EFF0F1;border-radius:10px;height:48px;display:flex;align-items:center;justify-content:center">${g.label}</div>`;
      } else {
        html+=`<div style="${colSpan}"></div>`;
      }
    });
  }
  if(!cfg.groupCols) html+=`<div class="hm-corner"><svg viewBox="0 0 100 100" preserveAspectRatio="none"><line x1="0" y1="0" x2="100" y2="100" stroke="#EFF0F1" stroke-width="1"/></svg><span class="hc-col">${corner.col}</span><span class="hc-row">${corner.row}</span></div>`;
  cols.forEach(c=>html+=`<div class="hm-header">${c.label}</div>`);
  extraCols.forEach((c,i)=>{ if(!mergedExtras.has(i)) html+=`<div class="hm-header">${c.label}</div>`; });
  rows.forEach((row,ri)=>{
    const rl=cfg.rowLabel(row);
    const hasReport=typeof REPORT_MD!=='undefined'&&(REPORT_MD[rl.name]!=null);
    const dotScore=rl.dotScore!=null?rl.dotScore:null;
    let dotHtml='';
    if(dotScore!=null){
      const dotColor=dotScore<40?'#E63838':dotScore<60?'#FD9A00':'#37C597';
      const dotGlow=dotScore<40?'rgba(230,56,56,.2)':dotScore<60?'rgba(253,154,0,.2)':'rgba(55,197,151,.2)';
      dotHtml=`<div style="width:8px;height:8px;border-radius:50%;flex-shrink:0;background:${dotColor};box-shadow:0 0 0 2px ${dotGlow}"></div>`;
    }
    html+=`<div class="hm-row-label" style="background:transparent;border-color:rgba(223,223,223,0.5)">
      ${dotHtml}
      <div style="flex-shrink:0;color:#3D4452">${row.icon||''}</div>
      <div>
        <div ${hasReport?`class="comp-link" onclick="openReportDrawer('${rl.name}')" title="查看评估报告"`:''} style="${hasReport?'cursor:pointer;':''};font-size:12px">${rl.name}</div>
        ${rl.sub?`<small style="font-size:11px">${rl.sub}</small>`:''}
      </div>
    </div>`;
    cols.forEach((c,ci)=>{
      const score=cfg.scoreOf(row,ci);
      const bg=heatColor(score),fg=textColor(score),bd=borderColor(score);
      const bgHover=heatColorHover(score),bdHover=borderColorHover(score);
      const sub=cfg.subOf?cfg.subOf(row,ci):'';
      const tr=cfg.trendOf?cfg.trendOf(row,ci):null;
      const dimName=rl.name+' · '+c.label;
      const emojiSvg=score>=80?laughIcon():score>=60?smileIcon():score>=40?neutralIcon():score>=20?sadIcon():cryIcon();
      html+=`<div class="hm-cell" data-ri="${ri}" data-ci="${ci}" data-dim="${dimName}" data-score="${score}" onclick="_mxClick('${cfg.gridId}',${ri},${ci},this)" style="background:${bg};color:${fg};border-color:${bd};--fg-color:${fg};--bg-hover:${bgHover};--bd-hover:${bdHover}">
        <div class="cv" style="display:flex;align-items:center;gap:3px">${emojiSvg} ${cfg.displayOf(row,ci)}${cellTrendSvg(tr)}</div>${sub?`<div class="ct">${sub}</div>`:''}
      </div>`;
    });
    extraCols.forEach(ec=>html+=`<div class="mx-extra-cell">${ec.render(row)}</div>`);
  });
  grid.innerHTML=html;
}
function _mxClick(gridId,ri,ci,el){
  document.querySelectorAll(`#${gridId} .hm-cell`).forEach(c=>c.classList.remove('hm-sel'));
  el.classList.add('hm-sel');
  const cfg=window._mxCfg[gridId];
  if(cfg&&cfg.onCellClick) cfg.onCellClick(ri,ci,el);
}

   vals:    [25.2,3.8,6.6,3.0,2.7,4.3,1.7,5.0,5.0],
   prevVals:[28.5,4.2,7.0,3.4,3.0,4.5,2.0,5.0,4.8],
   hist:    [[34,32,30,29,28,25],[46,44,43,41,40,38],[72,71,70,69,68,66],[72,70,68,66,64,60],[62,60,58,56,55,54],[90,90,88,88,87,86],[42,40,38,36,35,34],[100,100,100,100,100,100],[96,98,98,98,98,100]],
   trends:['d','d','d','d','d','f','d','f','u'], ec:'EC 50%·R 20%', updated:'05/21 00:06'},
];
let _spkIdx=0;
function miniSparkSvg(data, color, W=80, H=28){
  const n=data.length, min=Math.min(...data), max=Math.max(...data);
  const range=max-min||1;
  const pad=3;
  const xs=data.map((_,i)=>i/(n-1)*W);
  const ys=data.map(v=>H-(v-min)/range*(H-pad*2)-pad);
  const pts=xs.map((x,i)=>`${x.toFixed(1)},${ys[i].toFixed(1)}`).join(' ');
  const areaPts=pts+` ${xs[n-1].toFixed(1)},${H} 0,${H}`;
  const last=data[data.length-1], prev=data[data.length-2];
  const dotC=last>prev?'#6DBD9A':last<prev?'#E89494':'#AAAAAA';
  const gid=`spkg${_spkIdx++}`;
  return `<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" fill="none" xmlns="http://www.w3.org/2000/svg" style="vertical-align:middle">
    <defs><linearGradient id="${gid}" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="${color}" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="${color}" stop-opacity="0"/>
    </linearGradient></defs>
    <polygon points="${areaPts}" fill="url(#${gid})"/>
    <polyline points="${pts}" stroke="${color}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <circle cx="${xs[n-1].toFixed(1)}" cy="${ys[n-1].toFixed(1)}" r="2.2" fill="${dotC}"/>
  </svg>`;
}
function uxtNorm(colIdx, v){
  if(colIdx===0) return v;
  if(colIdx<=2) return v*10;
  return v*20;
}
let _uxtMatrixInited=false;
function initUXTMatrix(){
  if(_uxtMatrixInited)return;
  _uxtMatrixInited=true;
  renderMatrix({
    gridId:'uxtMatrix',
    rowLabelWidth:'130px',
    corner:{row:'组件',col:'维度'},
    groupCols:[
      {label:'综合',    span:1},
      {label:'分项评分', span:2},
      {label:'开发评分·子维度', span:6},
      {label:'更新时间', span:1, mergeHeader:true},
    ],
    cols:UXT_MATRIX_COLS.map(label=>({label})),
    extraCols:[{label:'更新时间',render:r=>`<span>${r.updated}</span>`}],
    rows:UXT_MATRIX_ROWS,
    rowLabel:r=>({name:r.name,sub:r.sub,dotScore:uxtNorm(0,r.vals[0])}),
    scoreOf:(r,ci)=>uxtNorm(ci,r.vals[ci]),
    displayOf:(r,ci)=>uxtNorm(ci,r.vals[ci]).toFixed(0),
    subOf:()=>'',
    trendOf:(r,ci)=>r.trends?r.trends[ci]:null,
    onCellClick:(ri,ci)=>showUxtDetail(ri,ci),
  });
}
function showUxtDetail(ri,ci){
  const r=UXT_MATRIX_ROWS[ri], col=UXT_MATRIX_COLS[ci];
  const norm=uxtNorm(ci,r.vals[ci]);
  const prevNorm=r.prevVals?uxtNorm(ci,r.prevVals[ci]):null;
  const delta=prevNorm!=null?Math.round(norm-prevNorm):null;
  const deltaColor=delta>0?'#6DBD9A':delta<0?'#E89494':'#AAAAAA';
  const deltaStr=delta!=null?(delta>0?`+${delta}`:String(delta)):'';
  const bg=heatColor(norm), fg=textColor(norm);
  const histData=r.hist?r.hist[ci]:null;
  const trend=r.trends?r.trends[ci]:null;
  const sparkColor=trend==='u'?'#6DBD9A':trend==='d'?'#E89494':'#AAAAAA';
  const det=document.getElementById('uxtMatrixDetail');
  if(!det)return;
  det.style.display='block';
  det.innerHTML=`
  <div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap">
    <div style="flex-shrink:0">
      <div style="width:56px;height:56px;border-radius:10px;background:${bg};color:${fg};display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:800;font-family:'JetBrains Mono',monospace">${norm.toFixed(0)}</div>
    </div>
    <div style="flex-shrink:0">
      <div style="display:flex;align-items:baseline;gap:8px">
        <span style="font-size:17px;font-weight:800;color:var(--text)">${r.name}</span>
        <span style="font-size:13px;font-weight:500;color:var(--text-3)">${r.sub}</span>
        ${prevNorm!=null?`<span style="font-size:12px;color:var(--text-3);margin-left:4px">上期 <span style="font-weight:700;color:var(--text-2)">${prevNorm.toFixed(0)}</span> <span style="color:${deltaColor};font-weight:700">${deltaStr}</span></span>`:''}
      </div>
      <div style="font-size:13px;color:var(--text-3);margin-top:3px">
        维度：${col} &nbsp;·&nbsp; ${r.ec} &nbsp;·&nbsp; 更新 ${r.updated}
      </div>
    </div>
    ${histData?`<div style="flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:3px">
      <span style="font-size:11.5px;color:var(--text-3)">近6期</span>
      ${miniSparkSvg(histData,sparkColor,110,45)}
    </div>`:''}
    <div style="margin-left:auto;display:flex;gap:6px;flex-wrap:wrap;align-items:flex-end">
      ${r.vals.map((val,i)=>{
        const n=uxtNorm(i,val);
        const pn=r.prevVals?uxtNorm(i,r.prevVals[i]):null;
        const d=pn!=null?Math.round(n-pn):null;
        const dc=d>0?'#6DBD9A':d<0?'#E89494':'#AAAAAA';
        const isActive=i===ci;
        return `<div style="text-align:center;min-width:40px;padding:4px 4px 6px;border-radius:7px;background:${isActive?'rgba(0,0,0,0.04)':'transparent'}">
          <div style="font-size:13.5px;color:var(--text-3);margin-bottom:3px;white-space:nowrap">${UXT_MATRIX_COLS[i]}</div>
          <div style="padding:3px 5px;border-radius:5px;background:${heatColor(n)};color:${textColor(n)};font-size:16px;font-weight:700;font-family:'JetBrains Mono',monospace">${n.toFixed(0)}</div>
          ${d!=null?`<div style="font-size:13px;color:${dc};font-weight:700;margin-top:2px">${d>0?'+'+d:d===0?'–':d}</div>`:''}
        </div>`;
      }).join('')}
    </div>
  </div>`;
}
initUXTMatrix();
</script>
</body>
</html>
